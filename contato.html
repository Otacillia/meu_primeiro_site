<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato - Meu Primeiro Site</title>
</head>
<body>
    <h1>Entre em Contato</h1>
    <form action="#" method="post">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required><br><br>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone"><br><br>

        <label for="assunto">Assunto:</label>
        <input type="text" id="assunto" name="assunto"><br><br>

        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem" name="mensagem" rows="4" cols="50"></textarea><br><br>

        <input type="checkbox" id="termos" name="termos" required>
        <label for="termos">Aceito os termos e condições</label><br><br>

        <button type="submit">Enviar</button>
    </form>
    <br>
    <a href="index.html">Voltar ao Início</a>
</body>
</html>
